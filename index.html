<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A fast and responsive client-side application interfacing with the GitHub REST API, featuring user lookup and dual user battle.">
  <title>API Hunter</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>API Hunter</h1>
    <div class="toggle-container">
      <button id="theme-toggle" aria-label="Toggle Theme"><i class="fas fa-moon"></i></button>
      <button id="mode-toggle" aria-pressed="false">Switch to Battle Mode</button>
    </div>
  </header>
  <main>
    <section class="search-section">
      <form id="search-form">
        <div id="search-inputs" class="inputs-grid">
          <div class="input-group">
            <label for="username-1" id="label-1">GitHub Username</label>
            <input type="text" id="username-1" required placeholder="e.g. octocat">
          </div>
          <div class="input-group hidden" id="group-2">
            <label for="username-2">Opponent Username</label>
            <input type="text" id="username-2" placeholder="e.g. torvalds">
          </div>
        </div>
        <button type="submit" id="submit-btn">Search Profile</button>
      </form>
    </section>

    <div id="loader" class="loader hidden" aria-live="polite">
      <div class="spinner"></div>
      <p>Loading profiles...</p>
    </div>

    <section id="results" class="results-grid"></section>
  </main>
  <footer>
    <p>&copy; 2026 API Hunter. All Rights Reserved.</p>
  </footer>
  <script src="app.js"></script>
</body>
</html>
